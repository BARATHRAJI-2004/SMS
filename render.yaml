services:
  - type: web
    name: apex-academy-sms
    runtime: docker
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: apex-sms-db
          property: connectionString

databases:
  - name: apex-sms-db
    plan: free
